services:
  sandbox:
    build:
      target: sandbox-build
    entrypoint: ["/sandbox_api/entrypoint.sh"]
    devices:
      - /dev/null:/dev/kvm
    volumes:
      - ${SANDBOX_PACKAGES_PATH:-./data/piston/packages}:/piston/packages:ro
    environment:
      - KVM_ENABLED=false
      - SANDBOX_USE_CGROUPV2=false
    security_opt:
      - seccomp=unconfined
    cap_add:
      - SYS_ADMIN
      - SYS_CHROOT
      - SYS_PTRACE
      - SETUID
      - SETGID
      - NET_ADMIN
      - DAC_OVERRIDE
      - DAC_READ_SEARCH
      - CHOWN
      - FOWNER
      - FSETID
      - KILL
      - SETFCAP
      - MKNOD
