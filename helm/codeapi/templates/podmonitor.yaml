{{- if .Values.metrics.enabled }}
{{- if .Values.api.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "codeapi.fullname" . }}-api
  labels:
    {{- include "codeapi.api.labels" . | nindent 4 }}
spec:
  podMetricsEndpoints:
    - path: /metrics
      port: http
      {{- with .Values.metrics.interval }}
      interval: {{ . }}
      {{- end }}
      {{- with .Values.metrics.scrapeTimeout }}
      scrapeTimeout: {{ . }}
      {{- end }}
  selector:
    matchLabels:
      {{- include "codeapi.api.selectorLabels" . | nindent 6 }}
{{- end }}
