services:
  api:
    image: codeapi.azurecr.io/sandbox:latest
    container_name: sandbox
    restart: always
    privileged: false
    devices:
      - ${KVM_DEVICE_PATH:-/dev/kvm}:/dev/kvm
    volumes:
      - ${SANDBOX_PACKAGES_PATH:-./data/piston/packages}:/host-packages:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - KVM_ENABLED=${KVM_ENABLED:-true}
      - FILE_SERVER_URL=http://file_server:${FILE_SERVER_PORT:-3000}
      - CODEAPI_INTERNAL_SERVICE_TOKEN=${CODEAPI_INTERNAL_SERVICE_TOKEN}
      # Launcher config (microVM)
      - LAUNCHER_VCPUS=${LAUNCHER_VCPUS:-2}
      - LAUNCHER_RAM_MIB=${LAUNCHER_RAM_MIB:-2048}
      - LAUNCHER_LOG_LEVEL=${LAUNCHER_LOG_LEVEL:-3}
      # Sandbox config (passed through to microVM guest)
      - SANDBOX_LOG_LEVEL=${SANDBOX_LOG_LEVEL:-DEBUG}
      - SANDBOX_MAX_PROCESS_COUNT=${SANDBOX_MAX_PROCESS_COUNT:-100}
      - SANDBOX_RUN_CPU_TIME=${SANDBOX_RUN_CPU_TIME:-10000}
      - SANDBOX_RUN_TIMEOUT=${SANDBOX_RUN_TIMEOUT:-15000}
      - SANDBOX_OUTPUT_MAX_SIZE=${SANDBOX_OUTPUT_MAX_SIZE:-65536}
      - SANDBOX_DISABLE_NETWORKING=${SANDBOX_DISABLE_NETWORKING:-true}
      - SANDBOX_MAX_OPEN_FILES=${SANDBOX_MAX_OPEN_FILES:-2048}
      - SANDBOX_MAX_FILE_SIZE=${SANDBOX_MAX_FILE_SIZE:-150000000}
      - SANDBOX_COMPILE_TIMEOUT=${SANDBOX_COMPILE_TIMEOUT:-10000}
      - SANDBOX_COMPILE_CPU_TIME=${SANDBOX_COMPILE_CPU_TIME:-10000}
      - SANDBOX_COMPILE_MEMORY_LIMIT=${SANDBOX_COMPILE_MEMORY_LIMIT:--1}
      - SANDBOX_RUN_MEMORY_LIMIT=${SANDBOX_RUN_MEMORY_LIMIT:-268435456}
      - SANDBOX_MAX_CONCURRENT_JOBS=${SANDBOX_MAX_CONCURRENT_JOBS:-64}
      - SANDBOX_ALLOWED_LOCAL_NETWORK_PORT=${SANDBOX_ALLOWED_LOCAL_NETWORK_PORT:-0}
      - SANDBOX_FORWARD_TARGET=${SANDBOX_FORWARD_TARGET:-}
  file_server:
    restart: always
    image: codeapi.azurecr.io/file-server:latest
    container_name: file_server
    environment:
      - MINIO_BUCKET=${MINIO_BUCKET}
      - MINIO_PORT=${MINIO_PORT:-9000}
      - MINIO_ENDPOINT=minio
      - MINIO_USE_SSL=${MINIO_USE_SSL:-false}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - FILE_SERVER_PORT=${FILE_SERVER_PORT:-3000}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - INSTANCE_ID=${INSTANCE_ID:-CODE_API}
      - CODEAPI_INTERNAL_SERVICE_TOKEN=${CODEAPI_INTERNAL_SERVICE_TOKEN}
    volumes:
      - ./file-server-logs:/app/logs/file-server
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - minio

  service:
    restart: always
    image: codeapi.azurecr.io/service:latest
    container_name: service
    ports:
      - 3112:3112
    environment:
      - SANDBOX_ENDPOINT=http://api:2000/api/v2
      - SANDBOX_RUN_MEMORY_LIMIT=${SANDBOX_RUN_MEMORY_LIMIT:-268435456}
      - FILE_SERVER_URL=http://file_server:${FILE_SERVER_PORT:-3000}
      - CODEAPI_INTERNAL_SERVICE_TOKEN=${CODEAPI_INTERNAL_SERVICE_TOKEN}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - PYTHON_CONCURRENCY=${PYTHON_CONCURRENCY:-8}
      - OTHER_CONCURRENCY=${OTHER_CONCURRENCY:-15}
      - JOB_WINDOW=${JOB_WINDOW:-1000}
      - INSTANCE_ID=${INSTANCE_ID:-CODE_API}
      - MAX_FILE_SIZE=${SANDBOX_MAX_FILE_SIZE:-150000000}
      - SANDBOX_ACCESS_TOKEN=${SANDBOX_ACCESS_TOKEN}
    volumes:
      - ./service-logs:/usr/src/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - redis

  redis:
    restart: always
    image: redis:6-alpine
    container_name: redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --port ${REDIS_PORT:-6379}
    volumes:
      - redis-data:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}

  minio:
    restart: always
    image: quay.io/minio/minio
    container_name: minio
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"

volumes:
  redis-data:
  minio_data:
