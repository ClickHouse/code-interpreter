server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://host.docker.internal:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      - json:
          expressions:
            log: log
      - output:
          source: log

  - job_name: file_server_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: app_logs
          service: file_server
          __path__: /logs/file-server/combined-*.log

  - job_name: service_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: app_logs
          service: service
          __path__: /logs/service/combined-*.log