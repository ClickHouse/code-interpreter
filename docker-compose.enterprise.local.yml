services:
  api:
    build: 
      context: .
      dockerfile: api/Dockerfile
    container_name: sandbox
    restart: always
    privileged: false
    devices:
      - ${KVM_DEVICE_PATH:-/dev/kvm}:/dev/kvm
    ports:
      - 2000:2000
    volumes:
      - ${SANDBOX_PACKAGES_PATH:-./data/piston/packages}:/host-packages:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - KVM_ENABLED=${KVM_ENABLED:-true}
      - FILE_SERVER_URL=http://file_server:${FILE_SERVER_PORT:-3000}
      - CODEAPI_INTERNAL_SERVICE_TOKEN=${CODEAPI_INTERNAL_SERVICE_TOKEN}
      # Launcher config (microVM)
      - LAUNCHER_VCPUS=${LAUNCHER_VCPUS:-2}
      - LAUNCHER_RAM_MIB=${LAUNCHER_RAM_MIB:-2048}
      - LAUNCHER_LOG_LEVEL=${LAUNCHER_LOG_LEVEL:-3}
      # Sandbox config (passed through to microVM guest)
      - SANDBOX_LOG_LEVEL=${SANDBOX_LOG_LEVEL:-DEBUG}
      - SANDBOX_MAX_PROCESS_COUNT=${SANDBOX_MAX_PROCESS_COUNT:-100}
      - SANDBOX_RUN_CPU_TIME=${SANDBOX_RUN_CPU_TIME:-60000}
      - SANDBOX_RUN_TIMEOUT=${SANDBOX_RUN_TIMEOUT:-300000}
      - SANDBOX_OUTPUT_MAX_SIZE=${SANDBOX_OUTPUT_MAX_SIZE:-65536}
      - SANDBOX_DISABLE_NETWORKING=${SANDBOX_DISABLE_NETWORKING:-true}
      - SANDBOX_ALLOWED_LOCAL_NETWORK_PORT=${SANDBOX_ALLOWED_LOCAL_NETWORK_PORT:-3033}
      - SANDBOX_FORWARD_TARGET=tool_call_server:${TOOL_CALL_SERVER_PORT:-3033}

  file_server:
    restart: always
    build:
      context: ${SERVICE_DIR}
      dockerfile: Dockerfile
      target: production
      args:
    container_name: file_server
    ports:
      - ${FILE_SERVER_PORT:-3000}:${FILE_SERVER_PORT:-3000}
    environment:
      - MINIO_BUCKET=test-bucket
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_USE_SSL=false
      - MINIO_ACCESS_KEY=AKIAIOSFODNN7EXAMPLE
      - MINIO_SECRET_KEY=wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
      - FILE_SERVER_PORT=${FILE_SERVER_PORT:-3000}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - INSTANCE_ID=${INSTANCE_ID}
      - CODEAPI_INTERNAL_SERVICE_TOKEN=${CODEAPI_INTERNAL_SERVICE_TOKEN}
    volumes:
      - ./file-server-logs:/app/logs/file-server
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - minio

  tool_call_server:
    restart: always
    build:
      context: ${SERVICE_DIR}
      dockerfile: Dockerfile.tool-call-server
      target: production
      args:
    container_name: tool_call_server
    ports:
      - ${TOOL_CALL_SERVER_PORT:-3033}:${TOOL_CALL_SERVER_PORT:-3033}
    environment:
      - TOOL_CALL_SERVER_PORT=${TOOL_CALL_SERVER_PORT:-3033}
      - TOOL_CALL_REQUEST_TIMEOUT=${TOOL_CALL_REQUEST_TIMEOUT:-300000}
      - TOOL_CALL_SESSION_EXPIRY=${TOOL_CALL_SESSION_EXPIRY:-600}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - INSTANCE_ID=${INSTANCE_ID}
      - CODEAPI_INTERNAL_SERVICE_TOKEN=${CODEAPI_INTERNAL_SERVICE_TOKEN}
    volumes:
      - ./tool-call-server-logs:/app/logs/tool-call-server
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - redis

  service:
    restart: always
    build:
      context: ${SERVICE_DIR}
      dockerfile: Dockerfile.enterprise
      target: production
      args:
    container_name: service
    ports:
      - 3112:3112
    environment:
      - SANDBOX_ENDPOINT=http://api:2000/api/v2
      - SANDBOX_ACCESS_TOKEN=${SANDBOX_ACCESS_TOKEN}
      - FILE_SERVER_URL=http://file_server:${FILE_SERVER_PORT:-3000}
      - TOOL_CALL_SERVER_URL=http://tool_call_server:${TOOL_CALL_SERVER_PORT:-3033}
      - CODEAPI_INTERNAL_SERVICE_TOKEN=${CODEAPI_INTERNAL_SERVICE_TOKEN}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - PYTHON_CONCURRENCY=${PYTHON_CONCURRENCY:-5}
      - OTHER_CONCURRENCY=${OTHER_CONCURRENCY:-15}
      - JOB_WINDOW=${JOB_WINDOW:-1000}
      # Must match or exceed programmatic request timeout for tool calls to work
      - JOB_TIMEOUT=${JOB_TIMEOUT:-300000}
      - EMAIL_SERVER=${EMAIL_SERVER}
      - INSTANCE_ID=${INSTANCE_ID}
    volumes:
      - ./service-logs:/usr/src/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - redis
      - tool_call_server

  redis:
    restart: always
    image: redis:6-alpine
    container_name: redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - 6379:6379
    volumes:
      - redis-data:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}

  minio:
    restart: always
    image: quay.io/minio/minio
    container_name: minio
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=AKIAIOSFODNN7EXAMPLE
      - MINIO_ROOT_PASSWORD=wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
    command: server /data --console-address ":9001"

volumes:
  redis-data:
  minio_data:
