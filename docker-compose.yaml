services:
    api:
        build:
            context: ${SERVICE_DIR:-./service}
            dockerfile: Dockerfile
            target: api
        container_name: api
        ports:
            - 3112:3112
        environment:
            - LOCAL_MODE=${LOCAL_MODE:-true}
            - CODEAPI_AUTH_PROVIDER=${CODEAPI_AUTH_PROVIDER:-}
            - CODEAPI_ALLOW_AUTH_PROVIDER_NONE=${CODEAPI_ALLOW_AUTH_PROVIDER_NONE:-}
            - CODEAPI_JWT_ISSUER=${CODEAPI_JWT_ISSUER:-}
            - CODEAPI_JWT_AUDIENCE=${CODEAPI_JWT_AUDIENCE:-}
            - CODEAPI_JWT_ALLOWED_ALGS=${CODEAPI_JWT_ALLOWED_ALGS:-}
            - CODEAPI_JWT_CLOCK_SKEW_SECONDS=${CODEAPI_JWT_CLOCK_SKEW_SECONDS:-}
            - CODEAPI_JWT_MAX_TTL_SECONDS=${CODEAPI_JWT_MAX_TTL_SECONDS:-}
            - CODEAPI_JWT_KEY_CACHE_TTL_SECONDS=${CODEAPI_JWT_KEY_CACHE_TTL_SECONDS:-}
            - CODEAPI_JWT_JWKS_JSON=${CODEAPI_JWT_JWKS_JSON:-}
            - CODEAPI_JWT_PUBLIC_KEYS_DIR=${CODEAPI_JWT_PUBLIC_KEYS_DIR:-}
            - CODEAPI_JWT_PUBLIC_KEY=${CODEAPI_JWT_PUBLIC_KEY:-}
            - CODEAPI_JWT_KID=${CODEAPI_JWT_KID:-}
            - CODEAPI_JWT_KEY_ID=${CODEAPI_JWT_KEY_ID:-}
            - CODEAPI_JWT_HS256_KID=${CODEAPI_JWT_HS256_KID:-}
            - CODEAPI_JWT_HS256_SECRET=${CODEAPI_JWT_HS256_SECRET:-}
            - CODEAPI_JWT_SINGLE_TENANT_ID=${CODEAPI_JWT_SINGLE_TENANT_ID:-}
            - CODEAPI_TENANT_ISOLATION_STRICT=${CODEAPI_TENANT_ISOLATION_STRICT:-}
            - CODEAPI_EXECUTION_MANIFEST_SECRET=${CODEAPI_EXECUTION_MANIFEST_SECRET:-}
            - EXECUTION_MANIFEST_TTL_SECONDS=${EXECUTION_MANIFEST_TTL_SECONDS:-}
            - EXECUTION_MANIFEST_MAX_UPLOAD_BYTES=${EXECUTION_MANIFEST_MAX_UPLOAD_BYTES:-}
            - EXECUTION_MANIFEST_MAX_OUTPUT_FILES=${EXECUTION_MANIFEST_MAX_OUTPUT_FILES:-}
            - EXECUTION_MANIFEST_MAX_REQUESTS=${EXECUTION_MANIFEST_MAX_REQUESTS:-}
            - MONGODB_URI
            - SANDBOX_ACCESS_TOKEN
            - SERVICE_PORT=3112
            - SANDBOX_ENDPOINT=http://sandbox:2000/api/v2
            - FILE_SERVER_URL=http://file_server:3000
            - TOOL_CALL_SERVER_URL=http://tool_call_server:3033
            - CODEAPI_INTERNAL_SERVICE_TOKEN=${CODEAPI_INTERNAL_SERVICE_TOKEN:-localdev-internal-service-token}
            - REDIS_HOST=redis
            - REDIS_PORT=6379
            - REDIS_PASSWORD=localdev
        depends_on:
            - redis
            - tool_call_server

    worker:
        build:
            context: ${SERVICE_DIR:-./service}
            dockerfile: Dockerfile
            target: worker
        container_name: worker
        environment:
            - LOCAL_MODE=${LOCAL_MODE:-true}
            - CODEAPI_AUTH_PROVIDER=${CODEAPI_AUTH_PROVIDER:-}
            - CODEAPI_JWT_SINGLE_TENANT_ID=${CODEAPI_JWT_SINGLE_TENANT_ID:-}
            - CODEAPI_TENANT_ISOLATION_STRICT=${CODEAPI_TENANT_ISOLATION_STRICT:-}
            - CODEAPI_EXECUTION_MANIFEST_SECRET=${CODEAPI_EXECUTION_MANIFEST_SECRET:-}
            - EXECUTION_MANIFEST_TTL_SECONDS=${EXECUTION_MANIFEST_TTL_SECONDS:-}
            - EXECUTION_MANIFEST_MAX_UPLOAD_BYTES=${EXECUTION_MANIFEST_MAX_UPLOAD_BYTES:-}
            - EXECUTION_MANIFEST_MAX_OUTPUT_FILES=${EXECUTION_MANIFEST_MAX_OUTPUT_FILES:-}
            - EXECUTION_MANIFEST_MAX_REQUESTS=${EXECUTION_MANIFEST_MAX_REQUESTS:-}
            - SANDBOX_ENDPOINT=http://sandbox:2000/api/v2
            - FILE_SERVER_URL=http://file_server:3000
            - TOOL_CALL_SERVER_URL=http://tool_call_server:3033
            - CODEAPI_INTERNAL_SERVICE_TOKEN=${CODEAPI_INTERNAL_SERVICE_TOKEN:-localdev-internal-service-token}
            - REDIS_HOST=redis
            - REDIS_PORT=6379
            - REDIS_PASSWORD=localdev
            - WORKER_HEALTH_PORT=3113
        depends_on:
            - redis
            - sandbox
            - tool_call_server

    tool_call_server:
        build:
            context: ${SERVICE_DIR:-./service}
            dockerfile: Dockerfile.tool-call-server
            target: production
        container_name: tool_call_server
        environment:
            - TOOL_CALL_SERVER_PORT=3033
            - TOOL_CALL_REQUEST_TIMEOUT=300000
            - TOOL_CALL_SESSION_EXPIRY=600
            - REDIS_HOST=redis
            - REDIS_PORT=6379
            - REDIS_PASSWORD=localdev
            - CODEAPI_INTERNAL_SERVICE_TOKEN=${CODEAPI_INTERNAL_SERVICE_TOKEN:-localdev-internal-service-token}
        depends_on:
            - redis

    sandbox:
        build:
          context: .
          dockerfile: api/Dockerfile
        container_name: sandbox
        restart: always
        privileged: false
        devices:
            - ${KVM_DEVICE_PATH:-/dev/kvm}:/dev/kvm
        ports:
            - 2000:2000
        volumes:
            - ${SANDBOX_PACKAGES_PATH:-./data/piston/packages}:/host-packages:ro
        environment:
            - KVM_ENABLED=${KVM_ENABLED:-true}
            - FILE_SERVER_URL=http://file_server:3000
            - CODEAPI_INTERNAL_SERVICE_TOKEN=${CODEAPI_INTERNAL_SERVICE_TOKEN:-localdev-internal-service-token}
            - SANDBOX_LOG_LEVEL=DEBUG
            - SANDBOX_OUTPUT_MAX_SIZE=65536
            - SANDBOX_RUN_TIMEOUT=60000
            - SANDBOX_RUN_CPU_TIME=60000
            - SANDBOX_COMPILE_TIMEOUT=30000
            - LAUNCHER_VCPUS=2
            - LAUNCHER_RAM_MIB=2048
            - LAUNCHER_LOG_LEVEL=3
            - SANDBOX_ALLOWED_LOCAL_NETWORK_PORT=3033
            - SANDBOX_FORWARD_TARGET=tool_call_server:3033
        depends_on:
            - file_server
            - tool_call_server

    file_server:
        build:
            context: ${SERVICE_DIR:-./service}
            dockerfile: Dockerfile
            target: production
        container_name: file_server
        ports:
            - 3000:3000
        environment:
            - MINIO_BUCKET=test-bucket
            - MINIO_ENDPOINT=minio
            - MINIO_PORT=9000
            - MINIO_USE_SSL=false
            - MINIO_ACCESS_KEY=minioadmin
            - MINIO_SECRET_KEY=minioadmin
            - FILE_SERVER_PORT=3000
            - REDIS_HOST=redis
            - REDIS_PORT=6379
            - REDIS_PASSWORD=localdev
            - CODEAPI_INTERNAL_SERVICE_TOKEN=${CODEAPI_INTERNAL_SERVICE_TOKEN:-localdev-internal-service-token}
        depends_on:
            - minio
            - redis

    redis:
        image: redis:7-alpine
        container_name: redis
        command: redis-server --requirepass localdev
        ports:
            - 6379:6379

    minio:
        image: quay.io/minio/minio
        container_name: minio
        ports:
            - 9000:9000
            - 9001:9001
        volumes:
            - minio_data:/data
        environment:
            - MINIO_ROOT_USER=minioadmin
            - MINIO_ROOT_PASSWORD=minioadmin
        command: server /data --console-address ":9001"

volumes:
    minio_data:
